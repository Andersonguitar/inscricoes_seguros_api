<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inscrições Congresso</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}

input {
  padding: 10px;
  width: 100%;
  max-width: 400px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: none;
}

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.nome {
  font-size: 18px;
  font-weight: bold;
}

.igreja {
  font-size: 13px;
  opacity: 0.8;
}

.telefone {
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>
<body>

<h2>Lista de Inscritos</h2>

<input type="text" id="pesquisa" placeholder="Pesquisar nome...">

<div id="lista"></div>

<script>

async function carregar() {

  const response = await fetch("/api/dados");
  const data = await response.json();

  const rows = data.values || [];

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  rows.slice(1).forEach(row => {

    const nome = row[1] || "";
    const igreja = row[2] || "";
    const telefone = row[3] || "";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="nome">${nome}</div>
      <div class="igreja">${igreja}</div>
      <div class="telefone">${telefone}</div>
    `;

    lista.appendChild(div);

  });
}

carregar();

// Atualiza a cada 60 segundos
setInterval(carregar, 60000);

// Pesquisa
document.getElementById("pesquisa").addEventListener("input", function() {

  const filtro = this.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const nome = card.querySelector(".nome").textContent.toLowerCase();
    card.style.display = nome.includes(filtro) ? "block" : "none";
  });

});

</script>

</body>
</html>
