<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscrições Congresso</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 700px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #222;
}

input {
  padding: 12px;
  width: 100%;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  transition: transform 0.2s ease;
}

.card:hover {
  transform: scale(1.02);
}

.nome {
  font-size: 18px;
  font-weight: bold;
  color: #222;
}

.igreja,
.telefone {
  font-size: 13px;
  color: #666;
  margin-top: 4px;
}

.total {
  text-align: center;
  margin-bottom: 15px;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

  <h2>Lista de Inscritos</h2>

  <div class="total" id="total"></div>

  <input type="text" id="pesquisa" placeholder="Pesquisar nome...">

  <div id="lista"></div>

</div>

<script>

async function carregar() {
  try {

    const response = await fetch("/api/dados");
    const data = await response.json();

    const rows = Array.isArray(data) ? data : (data.values || []);

    const lista = document.getElementById("lista");
    const total = document.getElementById("total");

    lista.innerHTML = "";

    if (rows.length <= 1) {
      total.textContent = "Nenhum inscrito encontrado.";
      return;
    }

    total.textContent = "Total de inscritos: " + (rows.length - 1);

    rows.slice(1).forEach(row => {

      const nome = row[1] || "";
      const igreja = row[2] || "";
      const telefone = row[3] || "";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="nome">${nome}</div>
        <div class="igreja">${igreja}</div>
        <div class="telefone">${telefone}</div>
      `;

      lista.appendChild(div);

    });

  } catch (erro) {
    console.error("Erro ao carregar:", erro);
  }
}

carregar();

// Atualiza automaticamente a cada 60 segundos
setInterval(carregar, 60000);

// Pesquisa dinâmica
document.getElementById("pesquisa").addEventListener("input", function() {

  const filtro = this.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const nome = card.querySelector(".nome").textContent.toLowerCase();
    card.style.display = nome.includes(filtro) ? "block" : "none";
  });

});

</script>

</body>
</html>
